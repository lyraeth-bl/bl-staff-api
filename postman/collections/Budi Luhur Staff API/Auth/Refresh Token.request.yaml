$kind: http-request
name: Refresh Token
method: POST
url: '{{base_url}}/api/v1/auth/refresh'
order: 2000
description: 'Exchanges a refresh_token for a new access_token and refresh_token pair. Returns access_token, refresh_token, token_type (Bearer), and expires_in.'
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refresh_token": "{{refresh_token}}"
    }
