$kind: http-request
name: Login
method: POST
url: '{{base_url}}/api/v1/auth/login'
order: 1000
description: 'Authenticates a user with email and password. Returns access_token, refresh_token, token_type (Bearer), expires_in, and user info (id, name, email).'
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "password": "{{password}}"
    }
