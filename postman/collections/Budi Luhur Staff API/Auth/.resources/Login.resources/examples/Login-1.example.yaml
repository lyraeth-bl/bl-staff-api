$kind: http-example
name: Login
description: Authenticates a user with email and password. Returns access_token,
  refresh_token, token_type (Bearer), expires_in, and user info (id, name,
  email).
request:
  url: "{{base_url}}/api/v1/auth/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
