$kind: http-example
description: Exchanges a refresh_token for a new access_token and refresh_token
  pair. Returns access_token, refresh_token, token_type (Bearer), and
  expires_in.
request:
  url: "{{base_url}}/api/v1/auth/refresh"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "refresh_token": "{{refresh_token}}"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    host: localhost:8000
    connection: close
    x-powered-by: PHP/8.3.6
